<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ASUNTO}}</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
</head>
<body style="margin:0; padding:0; background-color:#f4f4f4; font-family:Arial, Helvetica, sans-serif;">

  <!-- WRAPPER -->
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4;">
    <tr>
      <td align="center" style="padding:20px 0;">

        <!-- CONTENEDOR PRINCIPAL -->
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:8px; overflow:hidden;">

          <!-- HEADER -->
          <tr>
            <td style="background-color:#000000; padding:30px 40px; text-align:center;">
              <h1 style="margin:0; color:#ffffff; font-size:24px; font-weight:bold;">RUBEN COTON</h1>
            </td>
          </tr>

          <!-- CUERPO -->
          <tr>
            <td style="padding:40px;">
              <h2 style="margin:0 0 20px; color:#333333; font-size:20px;">{{TITULO}}</h2>
              <p style="margin:0 0 16px; color:#555555; font-size:16px; line-height:1.5;">
                {{CONTENIDO}}
              </p>

              <!-- BOTON CTA -->
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:30px auto;">
                <tr>
                  <td style="background-color:#ff6600; border-radius:6px;">
                    <a href="{{URL_CTA}}" target="_blank" style="display:inline-block; padding:14px 30px; color:#ffffff; text-decoration:none; font-size:16px; font-weight:bold;">
                      {{TEXTO_CTA}}
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td style="background-color:#f8f8f8; padding:20px 40px; text-align:center; border-top:1px solid #eeeeee;">
              <p style="margin:0 0 8px; color:#999999; font-size:12px;">
                RUBEN COTON | Email Marketing
              </p>
              <p style="margin:0; color:#999999; font-size:12px;">
                <a href="{{URL_UNSUB}}" style="color:#999999; text-decoration:underline;">Darse de baja</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
