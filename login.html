<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso privado · RUBEN COTON Email Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <style>
    :root {
      --negro: #000000;
      --naranja: #ff6600;
      --naranja-hover: #e55a00;
      --gris-fondo: #f4f4f4;
      --gris-borde: #e0e0e0;
      --gris-texto: #6b7280;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', Arial, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }
    .login-card {
      background: #ffffff;
      color: #1a1a1a;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4), 0 4px 12px rgba(255,102,0,0.15);
      border-top: 4px solid var(--naranja);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--gris-borde);
    }
    .brand img {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      object-fit: cover;
      background: #000;
      border: 1px solid rgba(0,0,0,0.08);
    }
    .brand-meta { line-height: 1.35; }
    .brand-badge {
      display: inline-block;
      background: var(--naranja);
      color: #fff;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 4px;
      margin-bottom: 4px;
    }
    .brand-note {
      font-size: 12px;
      color: var(--gris-texto);
      font-weight: 500;
    }
    h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }
    .subtitle {
      color: var(--gris-texto);
      font-size: 14px;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 8px;
    }
    .password-field {
      position: relative;
      margin-bottom: 18px;
    }
    .password-field input {
      width: 100%;
      padding: 14px 48px 14px 16px;
      font-size: 15px;
      font-family: inherit;
      border: 2px solid var(--gris-borde);
      border-radius: 10px;
      background: #fafafa;
      transition: border-color 0.15s, background 0.15s;
    }
    .password-field input:focus {
      outline: none;
      border-color: var(--naranja);
      background: #fff;
    }
    .toggle-eye {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 6px;
      color: #888;
    }
    .toggle-eye:hover { background: #f0f0f0; color: var(--naranja); }
    button[type="submit"] {
      width: 100%;
      background: var(--naranja);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.5px;
      cursor: pointer;
      font-family: inherit;
      text-transform: uppercase;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      min-height: 50px;
    }
    button[type="submit"]:hover {
      background: var(--naranja-hover);
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(255,102,0,0.35);
    }
    button[type="submit"]:disabled { opacity: 0.6; cursor: wait; transform: none; }
    .error {
      margin-top: 14px;
      padding: 10px 12px;
      background: #fef2f2;
      border-left: 3px solid #dc2626;
      border-radius: 6px;
      color: #991b1b;
      font-size: 13px;
      font-weight: 500;
    }
    .footer {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--gris-borde);
      text-align: center;
      font-size: 11px;
      color: #888;
    }
    .footer strong { color: var(--naranja); }
    @media (max-width: 480px) {
      .login-card { padding: 28px 22px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <main class="login-card">
    <div class="brand">
      <img src="/assets/img/logo-ruben-coton-bg.png" alt="RUBEN COTON" onerror="this.style.display='none'">
      <div class="brand-meta">
        <div class="brand-badge">RUBEN COTON</div>
        <div class="brand-note">Email Builder · IA local + Gemini</div>
      </div>
    </div>
    <h1>Acceso privado</h1>
    <p class="subtitle">Introduce la contraseña para entrar.</p>
    <form id="loginForm" autocomplete="off">
      <label for="password">Contraseña</label>
      <div class="password-field">
        <input
          id="password"
          name="password"
          type="password"
          placeholder="•••••••••"
          required
          autocomplete="current-password"
          autofocus
        />
        <button type="button" id="toggleEye" class="toggle-eye" aria-label="Mostrar contraseña" title="Mostrar contraseña">👁</button>
      </div>
      <button type="submit" id="submitBtn">Entrar</button>
      <div id="errorBox" class="error" hidden>Contraseña incorrecta. Intenta de nuevo.</div>
    </form>
    <div class="footer">Desarrollo técnico: <strong>RUBEN COTON</strong></div>
  </main>

  <script>
    (function(){
      var form = document.getElementById('loginForm');
      var input = document.getElementById('password');
      var btn = document.getElementById('submitBtn');
      var err = document.getElementById('errorBox');
      var toggle = document.getElementById('toggleEye');

      toggle.addEventListener('click', function(){
        var visible = input.type === 'text';
        input.type = visible ? 'password' : 'text';
        toggle.textContent = visible ? '👁' : '🙈';
        toggle.setAttribute('aria-label', visible ? 'Mostrar contraseña' : 'Ocultar contraseña');
        toggle.setAttribute('title', toggle.getAttribute('aria-label'));
        input.focus();
      });

      form.addEventListener('submit', async function(ev){
        ev.preventDefault();
        err.hidden = true;
        btn.disabled = true;
        var oldText = btn.textContent;
        btn.textContent = 'Comprobando…';
        try {
          var resp = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: input.value })
          });
          if (!resp.ok) {
            var data = await resp.json().catch(function(){ return {}; });
            err.textContent = data.error || 'Contraseña incorrecta. Intenta de nuevo.';
            err.hidden = false;
            input.focus(); input.select();
            return;
          }
          window.location.href = '/';
        } catch (e) {
          err.textContent = 'Error de red. Vuelve a intentarlo.';
          err.hidden = false;
        } finally {
          btn.disabled = false;
          btn.textContent = oldText;
        }
      });
    })();
  </script>
</body>
</html>
